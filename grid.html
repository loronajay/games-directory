<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay's Retro Arcade</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Press Start 2P',cursive;
  background:url('images/background.png') center center fixed;
  background-size:cover;
  color:white;
  text-align:center;
  overflow-x:hidden;
  animation:crtFlicker 6s infinite;
}

/* ===== OVERLAY ===== */
#arcadeOverlay{
  position:fixed;
  inset:0;
  background:black;
  opacity:1;
  z-index:9999;
  pointer-events:none;
  transition:opacity .45s ease;
}

/* ===== CRT COLLAPSE ===== */
.crt-collapse {
  animation: crtCollapse 0.6s forwards;
}

@keyframes crtCollapse {
  0% {
    transform: scaleY(1);
    filter: brightness(1);
  }
  60% {
    transform: scaleY(0.02);
    filter: brightness(1.5);
  }
  100% {
    transform: scaleY(0);
    filter: brightness(0);
    background: black;
  }
}

/* ===== CRT FLASH LINE ===== */
#crtFlash{
  position:fixed;
  left:0;
  width:100%;
  height:4px;
  background:white;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  z-index:10000;
  pointer-events:none;
}

.flash-active{
  animation:flashLine .15s ease-out forwards;
}

@keyframes flashLine{
  0%{opacity:1;height:6px;}
  100%{opacity:0;height:2px;}
}

@keyframes crtFlicker{
  0%,100%{opacity:1;}
  50%{opacity:.985;}
}

/* ===== CRT FX ===== */
.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,.25) 0px,
    rgba(0,0,0,.25) 1px,
    transparent 1px,
    transparent 4px
  );
}

.crt-overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
  background:radial-gradient(circle at center,
    rgba(0,0,0,0) 60%,
    rgba(0,0,0,.45) 100%);
}

/* ===== BOOT ===== */
#loadingScreen{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff66;
  font-family:monospace;
  padding:40px;
  font-size:14px;
  white-space:pre-line;
  z-index:3000;
}

/* ===== START ===== */
#startScreen{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  cursor:pointer;
  z-index:2500;
}

.arcade-title{
  font-size:1.8rem;
  color:#ff00ff;
  text-shadow:0 0 25px #ff00ff;
}

.press-start{
  margin-top:60px;
  color:#00ffff;
  animation:blink 1s infinite;
  text-shadow:0 0 20px #00ffff;
}

@keyframes blink{50%{opacity:0;}}

/* ===== MAIN ===== */
#mainContent{display:none;}

.title-box{
  margin-top:80px;
  padding:30px;
  background:rgba(0,0,0,.75);
  display:inline-block;
  border:3px solid #00ffff;
  box-shadow:0 0 40px #00ffff;
}

.title-box h1{
  color:#ff00ff;
  text-shadow:-2px 0 red,2px 0 cyan,0 0 20px #ff00ff;
}

.visitor-box{
  margin-top:20px;
  font-size:.8rem;
  color:#00ffff;
  text-shadow:0 0 10px #00ffff;
}

/* ===== GRID ===== */
.game-grid{
  margin:80px auto;
  max-width:1100px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  padding:20px;
}

@media(max-width:900px){
  .game-grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .game-grid{grid-template-columns:1fr;}
}

/* ===== CARDS ===== */
.game-card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:rgba(0,0,0,.85);
  border:3px solid #ff00ff;
  padding:15px;
  transition:transform .25s ease, box-shadow .25s ease;
}

.game-card:hover{
  transform:perspective(800px) rotateX(6deg) scale(1.06);
  box-shadow:0 0 40px #ff00ff, 0 0 20px #00ffff inset;
}

.game-card video{
  width:100%;
  height:180px;
  object-fit:cover;
  border:2px solid #00ffff;
}

.game-title{
  margin-top:15px;
  font-size:.8rem;
  color:#00ffff;
  text-shadow:0 0 12px #00ffff;
}

.game-play-count{
  margin-top:10px;
  font-size:.65rem;
  color:#00ffff;
  opacity:.85;
  text-shadow:0 0 8px #00ffff;
}

/* CRT Power On */
.crt-boot {
  animation: crtBoot 0.6s forwards;
}

@keyframes crtBoot {
  0% {
    transform: scaleY(0);
    filter: brightness(3);
  }
  40% {
    transform: scaleY(0.05);
    filter: brightness(2);
  }
  100% {
    transform: scaleY(1);
    filter: brightness(1);
  }
}

</style>
</head>
<body>

<div id="arcadeOverlay"></div>
<div id="crtFlash"></div>
<div id="loadingScreen"></div>

<div id="startScreen">
  <div class="arcade-title">JAY'S RETRO ARCADE</div>
  <div class="press-start">PRESS START</div>
</div>

<div class="scanlines"></div>
<div class="crt-overlay"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="music/background.mp3" type="audio/mpeg">
</audio>

<audio id="hoverSound" preload="auto">
  <source src="music/hovered.mp3" type="audio/mpeg">
</audio>

<audio id="shutdownSound" preload="auto">
  <source src="music/crt-shutdown.mp3" type="audio/mpeg">
</audio>

<div id="mainContent">

  <div class="title-box">
    <h1>Jay's Retro Arcade</h1>
    <div class="visitor-box">
      VISITORS: <span id="visitorCount">000000</span>
    </div>
  </div>

  <div class="game-grid">

    <a class="game-card arcade-link" href="apple-catcher/index.html">
      <video muted loop preload="metadata">
        <source src="previews/apple-catcher.mp4" type="video/mp4">
      </video>
      <div class="game-title">Apple Catcher</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

    <a class="game-card arcade-link" href="art-of-war/index.html">
      <video muted loop preload="metadata">
        <source src="previews/art-of-war.mp4" type="video/mp4">
      </video>
      <div class="game-title">Art Of War</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

    <a class="game-card arcade-link" href="bird-duty/index.html">
      <video muted loop preload="metadata">
        <source src="previews/bird-duty.mp4" type="video/mp4">
      </video>
      <div class="game-title">Bird Duty</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

    <a class="game-card arcade-link" href="dodgeballs/index.html">
      <video muted loop preload="metadata">
        <source src="previews/dodgeballs.mp4" type="video/mp4">
      </video>
      <div class="game-title">Dodgeballs!</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

    <a class="game-card arcade-link" href="sumorai/index.html">
      <video muted loop preload="metadata">
        <source src="previews/sumorai.mp4" type="video/mp4">
      </video>
      <div class="game-title">Sumorai</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

    <a class="game-card arcade-link" href="x-pong/index.html">
      <video muted loop preload="metadata">
        <source src="previews/x-pong.mp4" type="video/mp4">
      </video>
      <div class="game-title">X-Pong</div>
      <div class="game-play-count">
        PLAYS: <span class="playCount">000000</span>
      </div>
    </a>

  </div>
</div>

<script>
const overlay=document.getElementById("arcadeOverlay");
const shutdownSound=document.getElementById("shutdownSound");
const hoverSound=document.getElementById("hoverSound");

/* Fade in */
window.addEventListener("load",()=>{
  setTimeout(()=>{overlay.style.opacity="0";},200);
});

/* Boot */
const bootText=`
JAY SYSTEMS BIOS v2.3
Initializing Arcade Hardware...
Loading Game Engine...
System Ready.
`;

window.addEventListener("load",()=>{
  const loader=document.getElementById("loadingScreen");
  let i=0;
  const typing=setInterval(()=>{
    loader.textContent+=bootText[i];
    i++;
    if(i>=bootText.length){
      clearInterval(typing);
      setTimeout(()=>{
        loader.style.display="none";
        document.getElementById("startScreen").style.display="flex";
      },600);
    }
  },18);
});

/* Start */
document.getElementById("startScreen").addEventListener("click",()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";
  document.getElementById("bgMusic").play().catch(()=>{});
});

/* Navigation */
document.querySelectorAll(".arcade-link").forEach(link=>{
  const prefetch=document.createElement("link");
  prefetch.rel="prefetch";
  prefetch.href=link.href;
  document.head.appendChild(prefetch);

  link.addEventListener("mouseenter",()=>{
    hoverSound.currentTime=0;
    hoverSound.play().catch(()=>{});
    const vid=link.querySelector("video");
    if(vid)vid.play();
  });

  link.addEventListener("mouseleave",()=>{
    const vid=link.querySelector("video");
    if(vid){vid.pause();vid.currentTime=0;}
  });

  link.addEventListener("click", e => {
  e.preventDefault();

  shutdownSound.currentTime = 0;
  shutdownSound.play().catch(() => {});

  // Start collapse
  document.body.classList.add("crt-collapse");
  document.getElementById("crtFlash").classList.add("flash-active");

  // Fade overlay to black immediately
  overlay.style.transition = "opacity 0.3s ease";
  overlay.style.opacity = "1";

  // Redirect after animation completes
  setTimeout(() => {
    window.location.href = link.href;
  }, 650);
});
});

/* Counters */
function formatArcadeNumber(num){
  return num.toString().padStart(6,'0');
}

/* Total site */
fetch("https://loronajay.goatcounter.com/counter/TOTAL.json")
.then(res=>res.json())
.then(data=>{
  document.getElementById("visitorCount").textContent=
    formatArcadeNumber(data.count||0);
})
.catch(()=>{});

/* Per game */
document.querySelectorAll(".game-card").forEach(card=>{
  const path=new URL(card.href).pathname;
  fetch(`https://loronajay.goatcounter.com/counter/${path}.json`)
  .then(res=>res.json())
  .then(data=>{
    card.querySelector(".playCount").textContent=
      formatArcadeNumber(data.count||0);
  })
  .catch(()=>{});
});

/* Force hard reload when returning via back button */
window.addEventListener("pageshow", function(event) {
  if (event.persisted || performance.getEntriesByType("navigation")[0]?.type === "back_forward") {
    window.location.reload();
  }
});

/* Detect back button navigation */
window.addEventListener("pageshow", function(event) {
  const navType = performance.getEntriesByType("navigation")[0]?.type;

  if (event.persisted || navType === "back_forward") {

    // Force fresh state
    document.body.style.transform = "scaleY(0)";
    document.body.style.filter = "brightness(3)";

    // Small delay so style applies
    setTimeout(() => {
      document.body.classList.add("crt-boot");
    }, 50);
  }
});

</script>

</body>
</html>
