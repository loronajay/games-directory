<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jay's Retro Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Press Start 2P',cursive;
  background:black;
  color:#00ffff;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

h1{
  color:#ff00ff;
  text-shadow:0 0 25px #ff00ff;
  margin-bottom:60px;
}

.mode-btn{

  margin:20px;
  padding:20px 40px;
  font-size:14px;
  background:black;
  border:3px solid #00ffff;
  color:#00ffff;
  cursor:pointer;
  transition:.2s;
}

.mode-btn:hover{
  background:#00ffff;
  color:black;
}
</style>
</head>

<body>

<h1>SELECT MODE</h1>

<button class="mode-btn" onclick="location.href='grid.html'">
  QUICK SELECT
</button>

<button class="mode-btn" onclick="location.href='mini-arcade/index.html'">

</html>
