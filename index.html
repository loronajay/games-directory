<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay's Retro Arcade</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Press Start 2P',cursive;
  background:black;
  color:white;
  overflow-x:hidden;
  overflow-y:auto;
  min-height:100vh;
}

/* CRT FX */
.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,.25) 0px,
    rgba(0,0,0,.25) 1px,
    transparent 1px,
    transparent 4px
  );
}

.crt-overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
  background:radial-gradient(circle at center,
    rgba(0,0,0,0) 55%,
    rgba(0,0,0,.6) 100%);
}

/* CRT collapse animation */
.crt-collapse{
  animation:crtCollapse .6s forwards;
  transform-origin:center;
}

@keyframes crtCollapse{
  0%{transform:scaleY(1);opacity:1;}
  60%{transform:scaleY(.05);opacity:.9;}
  100%{transform:scaleY(0);opacity:0;}
}

/* ===== CRT FLASH LINE ===== */
#crtFlash{
  position:fixed;
  left:0;
  width:100%;
  height:4px;
  background:white;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  z-index:10000;
  pointer-events:none;
}

.flash-active{
  animation:flashLine .15s ease-out forwards;
}

@keyframes flashLine{
  0%{opacity:1;height:6px;}
  100%{opacity:0;height:2px;}
}

/* Layout */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

h1{
  color:#ff00ff;
  text-shadow:0 0 25px #ff00ff;
  margin-bottom:60px;
  font-size:1.5rem;
}

.mode-wrapper{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  width:100%;
  max-width:1000px;
  margin:0 auto;
}

.mode-card{
  width:min(360px, 100%);
  background:rgba(0,0,0,.85);
  border:3px solid #00ffff;
  box-shadow:0 0 30px #00ffff;
  cursor:pointer;
  transition:.3s;
  text-decoration:none;
  color:inherit;
  overflow:hidden;
}

.mode-card:hover,
.mode-card.gamepad-selected{
  transform:perspective(1000px) rotateX(6deg) scale(1.05);
  box-shadow:0 0 40px #ff00ff,0 0 30px #00ffff inset;
}

.preview-video{
  width:100%;
  height:200px;
  object-fit:cover;
  border-bottom:3px solid #00ffff;
}

.mode-title{
  padding:20px;
  font-size:.8rem;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

.mode-desc{
  padding:0 20px 20px;
  font-size:.6rem;
  opacity:.8;
}

/* CRT Power On */
.crt-boot {
  animation: crtBoot 0.6s forwards;
}

@keyframes crtBoot {
  0% {
    transform: scaleY(0);
    filter: brightness(3);
  }
  40% {
    transform: scaleY(0.05);
    filter: brightness(2);
  }
  100% {
    transform: scaleY(1);
    filter: brightness(1);
  }
}

@media (max-width: 900px){
  .container{
    padding:30px 16px 40px;
    justify-content:flex-start;
  }

  h1{
    margin-bottom:40px;
    font-size:1.1rem;
    line-height:1.5;
  }

  .mode-wrapper{
    gap:24px;
  }

  .mode-card{
    width:min(500px, 100%);
  }

  .preview-video{
    height:180px;
  }

  .mode-title{
    font-size:.75rem;
    padding:18px;
  }

  .mode-desc{
    font-size:.58rem;
    line-height:1.6;
    padding:0 18px 18px;
  }
}

@media (max-width: 600px){
  .container{
    padding:24px 12px 32px;
  }

  h1{
    font-size:.9rem;
    margin-bottom:28px;
  }

  .mode-wrapper{
    gap:18px;
  }

  .mode-card{
    width:min(100%, 500px);
    margin:0 auto;
  }

  .preview-video{
    height:160px;
  }

  .mode-title{
    font-size:.68rem;
    padding:16px;
  }

  .mode-desc{
    font-size:.52rem;
    line-height:1.5;
    padding:0 16px 16px;
  }
}
</style>
</head>

<body>

<div class="scanlines"></div>
<div class="crt-overlay"></div>
<div id="crtFlash"></div>

<audio id="hoverSound" preload="auto">
  <source src="music/hovered.mp3" type="audio/mpeg">
</audio>

<audio id="shutdownSound" preload="auto">
  <source src="music/crt-shutdown.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>SELECT YOUR MODE</h1>

  <div class="mode-wrapper">

  <a href="grid.html" class="mode-card mode-link">
    <video class="preview-video" autoplay muted loop playsinline>
      <source src="previews/grid-preview.mp4" type="video/mp4">
    </video>
    <div class="mode-title">QUICK SELECT</div>
    <div class="mode-desc">
      Jump straight into any game instantly.
    </div>
  </a>

  <a href="games/mini-arcade/index.html" class="mode-card mode-link">
    <video class="preview-video" autoplay muted loop playsinline>
      <source src="previews/arcade-preview.mp4" type="video/mp4">
    </video>
    <div class="mode-title">ENTER ARCADE</div>
    <div class="mode-desc">
      Walk the lobby. Choose a cabinet.
      Future social hub.
    </div>
  </a>

</div>

  </div>
</div>

<script src="js/arcade-input.js"></script>

<script>
const hoverSound = document.getElementById("hoverSound");
const shutdownSound = document.getElementById("shutdownSound");

let audioUnlocked = false;

/* Unlock audio on first real user interaction */
function unlockAudio(){
  if(audioUnlocked) return;

  hoverSound.volume = 0;
  hoverSound.play().then(()=>{
    hoverSound.pause();
    hoverSound.currentTime = 0;
    hoverSound.volume = 1;
    audioUnlocked = true;
  }).catch(()=>{});
}

["click","keydown","touchstart"].forEach(evt=>{
  document.addEventListener(evt, unlockAudio, { once:true });
});

/* Hover Sound */
document.querySelectorAll(".mode-card").forEach(card=>{
  card.addEventListener("mouseenter",()=>{
    if(!audioUnlocked) return;
    hoverSound.currentTime = 0;
    hoverSound.play().catch(()=>{});
  });
});

/* Click Transition */
document.querySelectorAll(".mode-link").forEach(link=>{
  link.addEventListener("click",e=>{
    e.preventDefault();

    document.querySelectorAll(".preview-video").forEach(v=>v.pause());

    if(audioUnlocked){
      shutdownSound.currentTime = 0;
      shutdownSound.play().catch(()=>{});
    }

    document.body.classList.add("crt-collapse");
    document.getElementById("crtFlash").classList.add("flash-active");

    setTimeout(()=>{
      window.location.href = link.href;
    },650);
  });
});

/* Force hard reload when returning via back button */
window.addEventListener("pageshow", function(event) {
  if (event.persisted || performance.getEntriesByType("navigation")[0]?.type === "back_forward") {
    window.location.reload();
  }
});

/* Detect back button navigation */
window.addEventListener("pageshow", function(event) {
  const navType = performance.getEntriesByType("navigation")[0]?.type;

  if (event.persisted || navType === "back_forward") {
    document.body.style.transform = "scaleY(0)";
    document.body.style.filter = "brightness(3)";

    setTimeout(() => {
      document.body.classList.add("crt-boot");
    }, 50);
  }
});

/* INDEX PAGE GAMEPAD NAVIGATION */

const gamepadItems = Array.from(document.querySelectorAll(".mode-link"));
let selectedIndex = 0;

function setSelectedIndex(index, playSound = true) {
  if (!gamepadItems.length) return;

  gamepadItems.forEach(item => item.classList.remove("gamepad-selected"));

  selectedIndex = ((index % gamepadItems.length) + gamepadItems.length) % gamepadItems.length;

  const selected = gamepadItems[selectedIndex];
  selected.classList.add("gamepad-selected");

  if (playSound && audioUnlocked) {
    hoverSound.currentTime = 0;
    hoverSound.play().catch(()=>{});
  }
}

function activateSelectedItem(){
  const selected = gamepadItems[selectedIndex];
  if(!selected) return;

  selected.click();
}

/* Mouse hover sync */
gamepadItems.forEach((item,index)=>{
  item.addEventListener("mouseenter",()=>{
    selectedIndex = index;
    setSelectedIndex(index,false);
  });
});

/* Start with first card selected */
setSelectedIndex(0,false);

/* Shared input */
ArcadeInput.onAction((action,source)=>{

  if(action==="left"){
    setSelectedIndex(selectedIndex-1);
  }

  if(action==="right"){
    setSelectedIndex(selectedIndex+1);
  }

  if(action==="select"){
    activateSelectedItem();
  }

});
</script>

</body>
</html>
