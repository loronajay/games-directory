<!DOCTYPE html>
<html>
<head>
  <title>Jay's TurboWarp Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 30px 0;
      font-size: 2.5rem;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .game-card {
      background: #1f2a40;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .game-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .game-card h2 {
      padding: 15px;
      margin: 0;
      font-size: 1.2rem;
    }

    footer {
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <h1>🎮 Jay's TurboWarp Arcade</h1>

  <div class="game-grid">

    <div class="game-card" onclick="openGame('apple-catcher/index.html')">
      <img src="thumbnails/apple-catcher.png" alt="Apple Catcher">
      <h2>Apple Catcher</h2>
    </div>

    <div class="game-card" onclick="openGame('art-of-war/index.html')">
      <img src="thumbnails/art-of-war.png" alt="Art of War">
      <h2>Art of War</h2>
    </div>

    <div class="game-card" onclick="openGame('bird-duty/index.html')">
      <img src="thumbnails/bird-duty.png" alt="Bird Duty">
      <h2>Bird Duty</h2>
    </div>

    <div class="game-card" onclick="openGame('dodgeballs/index.html')">
      <img src="thumbnails/dodgeballs.png" alt="Dodgeballs!">
      <h2>Dodgeballs!</h2>
    </div>

    <div class="game-card" onclick="openGame('sumorai/index.html')">
      <img src="thumbnails/sumorai.png" alt="Don't Get Hit!">
      <h2>Don't Get Hit!</h2>
    </div>

    <div class="game-card" onclick="openGame('x-pong/index.html')">
      <img src="thumbnails/x-pong.png" alt="X-Pong">
      <h2>X-Pong</h2>
    </div>

  </div>

  <footer>
    Built with TurboWarp 🚀
  </footer>

  <script>
    function openGame(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
